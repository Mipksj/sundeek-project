<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест браузера</title>
<style>
body{font-family:-apple-system,Arial,sans-serif;background:#171717;color:#fff;padding:20px;font-size:18px;line-height:1.8}
h1{font-size:22px;margin-bottom:20px}
.ok{color:#10d860}
.no{color:#ff5050;font-weight:bold}
.row{padding:8px 0;border-bottom:1px solid #333}
#summary{margin-top:25px;padding:15px;border-radius:10px;font-size:17px}
#btn{margin-top:20px;padding:15px 25px;font-size:18px;background:#fff;color:#000;border:none;border-radius:10px;width:100%}
</style>
</head>
<body>
<h1>Проверка браузера sundeek</h1>
<div id="results">Загрузка...</div>
<div id="summary"></div>
<button id="btn">Проверить кнопку (нажми меня)</button>
<div id="btn-result" style="margin-top:15px;font-size:18px"></div>

<script>
// Весь тест на ES5 — работает даже в очень старых браузерах
var results = [];
var failed = [];

function test(name, fn) {
  var ok = false;
  try { ok = !!fn(); } catch (e) { ok = false; }
  results.push('<div class="row">' + name + ': ' + (ok ? '<span class="ok">РАБОТАЕТ</span>' : '<span class="no">НЕ РАБОТАЕТ</span>') + '</div>');
  if (!ok) failed.push(name);
}

test('1. Стрелочные функции (=>)', function(){ return eval('(function(){ return (()=>5)(); })()') === 5; });
test('2. Шаблонные строки (backtick)', function(){ return eval('(function(){ var a=1; return `x${a}`; })()') === 'x1'; });
test('3. let / const', function(){ eval('let _t1=1; const _t2=2;'); return true; });
test('4. Деструктуризация', function(){ return eval('(function(){ var [a,b]=[1,2]; return a+b; })()') === 3; });
test('5. async / await (КРИТИЧНО)', function(){ eval('(async function(){ await 1; })'); return true; });
test('6. fetch (КРИТИЧНО)', function(){ return typeof fetch === 'function'; });
test('7. Promise', function(){ return typeof Promise === 'function'; });
test('8. Потоковая передача ReadableStream', function(){ return typeof ReadableStream !== 'undefined'; });
test('9. TextDecoder (для стриминга)', function(){ return typeof TextDecoder !== 'undefined'; });
test('10. Распознавание речи (голосовой чат)', function(){ return ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window); });
test('11. Синтез речи', function(){ return 'speechSynthesis' in window; });

document.getElementById('results').innerHTML = results.join('');

var sum = document.getElementById('summary');
if (failed.length === 0) {
  sum.style.background = '#0a3d1a';
  sum.innerHTML = 'РЕЗУЛЬТАТ: всё поддерживается. Проблема не в браузере.';
} else {
  sum.style.background = '#3d0a0a';
  sum.innerHTML = 'РЕЗУЛЬТАТ: браузер НЕ поддерживает: <br><b>' + failed.join('<br>') + '</b>';
}

// Тест клика
document.getElementById('btn').onclick = function() {
  document.getElementById('btn-result').innerHTML = '<span class="ok">Кнопка работает! JavaScript выполняется.</span>';
};
</script>
</body>
</html>
